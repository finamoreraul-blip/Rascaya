<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RascaYa | Gana $ por mirar anuncios</title>
  <meta name="description" content="Mirá anuncios y ganá pesos al instante. 100% Argentina.">

  <!-- PASO 1: PEGÁ ACÁ EL CÓDIGO DE MONETAG / ADSTERRA -->
  <!-- Ejemplo: <script src='//ad.monetag.com/...'></script> -->
  <!-- Después de pegarlo, guardá y subilo a GitHub -->

  <style>
    :root {
      --verde: #00C853;
      --negro: #121212;
      --gris: #1E1E1E;
      --blanco: #F5F5F5;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
    body { background: var(--negro); color: var(--blanco); text-align: center; padding: 40px 20px; }
    .card {
      max-width: 400px;
      margin: 0 auto;
      background: var(--gris);
      border-radius: 20px;
      padding: 30px 20px;
      box-shadow: 0 0 20px rgba(0,200,83,0.2);
    }
    h1 { font-size: 2rem; color: var(--verde); margin-bottom: 10px; }
    p { font-size: 1rem; opacity: 0.9; margin-bottom: 25px; }
    .saldo {
      font-size: 3rem;
      font-weight: 800;
      color: var(--verde);
      margin: 15px 0;
    }
    .btn {
      width: 100%;
      padding: 18px;
      font-size: 1.2rem;
      font-weight: 700;
      background: var(--verde);
      color: var(--negro);
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { background: #444; color: #aaa; cursor: not-allowed; }
    .nota { font-size: 0.85rem; opacity: 0.6; margin-top: 20px; }
  </style>
</head>
<body>

  <div class="card">
    <h1>💸 RascaYa</h1>
    <p>Mirá un anuncio y sumá $0.15 ARS</p>

    <div class="saldo" id="saldo">$0.00</div>

    <button class="btn" id="btnRaspar">Raspar y Ganar</button>

    <p class="nota">Retirá por Payoneer o Crypto cuando llegues a $500 ARS</p>
  </div>

  <script>
    // Esto es solo para que se vea funcional mientras Monetag aprueba
    let saldo = parseFloat(localStorage.getItem('saldo') || "0");
    const saldoEl = document.getElementById('saldo');
    const btn = document.getElementById('btnRaspar');

    function actualizarSaldo() {
      saldoEl.textContent = `$${saldo.toFixed(2)}`;
    }
    actualizarSaldo();

    btn.addEventListener('click', () => {
      btn.disabled = true;
      btn.textContent = "Mostrando anuncio...";

      // PASO 2: ACÁ VA EL "SHOW_AD" DE MONETAG CUANDO TE LO DEN
      // Ejemplo Monetag: show_1234567().then(() => { sumarSaldo() })
      
      setTimeout(() => { // Simulación de 5 segundos viendo anuncio
        saldo += 0.15;
        localStorage.setItem('saldo', saldo);
        actualizarSaldo();
        btn.disabled = false;
        btn.textContent = "Raspar y Ganar";
      }, 5000);
    });
  </script>

</body>
</html>
