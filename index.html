<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="monetag" content="cf89a74b7c3c298cd1302744700289ba">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RascaYa - Gana viendo anuncios</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f59e0b">
<style>
  body{font-family:system-ui,Segoe UI,Roboto;background:#0f172a;color:#e2e8f0;margin:0;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh}
  .card{background:#1e293b;padding:24px;border-radius:16px;box-shadow:0 8px 24px #0006;text-align:center;max-width:360px;width:90%}
  h1{margin:0 0 8px;font-size:28px;color:#fbbf24}
  .saldo{font-size:40px;font-weight:800;margin:12px 0;color:#22d3ee}
  button{background:#f59e0b;border:0;color:#0f172a;font-weight:700;font-size:18px;padding:14px 22px;border-radius:12px;cursor:pointer;width:100%;margin-top:8px}
  button:disabled{background:#475569;color:#94a3b8;cursor:not-allowed}
  .info{font-size:13px;color:#94a3b8;margin-top:12px}
</style>
</head>
<body>
  <div class="card">
    <h1>🎁 RascaYa</h1>
    <div class="saldo">$<span id="saldo">0.00</span></div>
    <button id="rasparBtn">Raspar y Ganar $0.15</button>
    <div class="info">Mirá 1 anuncio completo para cobrar</div>
  </div>

<!-- CÓDIGO MONETAG REWARDED - TU ZONE ID 11231361 -->
<script>
  function show_11231361() {
    return new Promise((resolve, reject) => {
      if(typeof window.show_11231361 === 'function') {
        window.show_11231361().then(resolve).catch(reject);
      } else {
        reject('Ad no disponible');
      }
    });
  }
</script>

<script>
  let saldo = parseFloat(localStorage.getItem('saldoRasca') || '0');
  const saldoEl = document.getElementById('saldo');
  const btn = document.getElementById('rasparBtn');
  
  function actualizarSaldo() {
    saldoEl.textContent = saldo.toFixed(2);
  }
  actualizarSaldo();

  btn.addEventListener('click', async () => {
    btn.disabled = true;
    btn.textContent = 'Cargando anuncio...';
    
    try {
      await show_11231361(); 
      saldo += 0.15;
      localStorage.setItem('saldoRasca', saldo.toString());
      actualizarSaldo();
      alert('+$0.15 acreditado ✅');
    } catch (e) {
      alert('El anuncio no se completó. Probá de nuevo.');
    }
    
    btn.disabled = false;
    btn.textContent = 'Raspar y Ganar $0.15';
  });
</script>

<!-- SERVICE WORKER PARA MONETAG + PWA -->
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js');
}
</script>

</body>
</html>
